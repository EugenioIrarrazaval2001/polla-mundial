<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Pollas Mundialeras</title>
<style>
body {
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1124, #172a59);
    color: #eef3ff;
}
.wrap {
    width: min(560px, calc(100% - 40px));
    background: rgba(8, 16, 37, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 26px;
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
}
h1 {
    margin: 0 0 8px;
    text-align: center;
}
p {
    margin: 0 0 18px;
    text-align: center;
    color: rgba(238, 243, 255, 0.78);
}
.links {
    display: grid;
    gap: 10px;
}
a {
    display: block;
    text-decoration: none;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    background: #243f86;
    color: #ffffff;
    font-weight: 700;
}
a:hover {
    background: #2f50a6;
}
</style>
</head>
<body>
<main class="wrap">
<h1>Pollas Mundialeras</h1>
<p>Selecciona una competencia para ver la tabla.</p>
<div class="links">
<a href="./familia/index.html">Ver polla familia</a>
<a href="./curso/index.html">Ver polla curso</a>
</div>
</main>
</body>
</html>
